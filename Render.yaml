services:
  - type: web
    name: neon-platform
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: ADMIN_PASSWORD
        value: 10032008
      - key: EVOLUTION_API_URL
