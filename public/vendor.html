<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر · Neon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06060e; --s: rgba(18,18,40,0.5); --sh: rgba(18,18,40,0.8);
  --sg: rgba(18,18,40,0.3); --b: rgba(255,255,255,0.03); --bh: rgba(255,255,255,0.06);
  --pink: #ff2d7b; --pg: rgba(255,45,123,0.12); --cyan: #00e5ff; --cg: rgba(0,229,255,0.08);
  --em: #10b981; --tx: #f0f0ff; --t2: #8888aa; --t3: #444466; --da: #ff4466;
  --r: 10px; --fn: 'Noto Sans Arabic',sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
::selection { background:var(--pg); }
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--pink); border-radius:2px; }
body { font-family:var(--fn); background:var(--bg); min-height:100vh; color:var(--tx); overflow-x:hidden; direction:rtl; }

#bgC { position:fixed; inset:0; z-index:-2; }
.g-noise { position:fixed; inset:0; z-index:-1; opacity:.008; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size:256px; pointer-events:none; }

@keyframes fIn { from{opacity:0;transform:translateY(30px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
@keyframes sp { to{transform:rotate(360deg)} }

#ls { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:10; backdrop-filter:blur(4px); }
#ls.h { display:none; }
.lc { background:var(--s); backdrop-filter:blur(30px) saturate(1.3); border-radius:14px; border:1px solid var(--b); padding:40px 36px; width:380px; max-width:90vw; animation:fIn .5s ease; }
.lc .lo { text-align:center; margin-bottom:22px; }
.lc .lo .ic { width:54px; height:54px; margin:0 auto 12px; background:linear-gradient(135deg,var(--cg),var(--pg)); border-radius:16px; display:flex; align-items:center; justify-content:center; position:relative; }
.lc .lo .ic::after { content:''; position:absolute; inset:-2px; border-radius:18px; background:linear-gradient(135deg,var(--cyan),var(--pink)); opacity:.15; }
.lc .lo h1 { font-size:19px; font-weight:800; background:linear-gradient(135deg,var(--cyan),var(--pink)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.lc .lo p { color:var(--t2); font-size:12px; margin-top:2px; }

.msg { padding:8px 12px; border-radius:6px; font-size:12px; text-align:center; display:none; margin-bottom:12px; }
.msg.b { background:rgba(255,68,102,.04); color:var(--da); border:1px solid rgba(255,68,102,.06); }
.msg.g { background:rgba(16,185,129,.04); color:var(--em); border:1px solid rgba(16,185,129,.06); }

.g { margin-bottom:13px; }
.g label { display:block; color:var(--t2); font-size:11px; margin-bottom:3px; font-weight:600; }
.inp { position:relative; }
.inp input { width:100%; padding:9px 12px; background:rgba(0,0,0,.25); border:1px solid var(--b); border-radius:6px; color:var(--tx); font-size:13px; transition:all .2s; font-family:var(--fn); }
.inp input:focus { outline:none; border-color:var(--pink); box-shadow:0 0 0 3px var(--pg); }
.inp input::placeholder { color:var(--t3); }

.btn { padding:7px 16px; border:none; border-radius:6px; font-size:11px; font-weight:600; cursor:pointer; transition:all .2s; font-family:var(--fn); display:inline-flex; align-items:center; gap:5px; white-space:nowrap; }
.btn-p { background:linear-gradient(135deg,var(--pink),#cc2060); color:white; }
.btn-p:hover { transform:translateY(-1px); box-shadow:0 4px 18px var(--pg); }
.btn-g { background:var(--sg); border:1px solid var(--b); color:var(--t2); }
.btn-g:hover { background:var(--sh); color:var(--tx); }
.btn-d { background:rgba(255,68,102,.04); color:var(--da); border:1px solid rgba(255,68,102,.06); }
.btn-d:hover { background:rgba(255,68,102,.08); }
.btn-c { background:var(--cg); color:var(--cyan); border:1px solid rgba(0,229,255,.06); }
.btn-c:hover { background:rgba(0,229,255,.08); }
.btn-w { width:100%; padding:10px; font-size:13px; justify-content:center; margin-top:4px; }

#hd { display:none; padding:18px 24px 0; max-width:1000px; margin:0 auto; }
#hd.on { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
#hd .tt { font-size:16px; font-weight:700; display:flex; align-items:center; gap:6px; }
#hd .sr { display:flex; align-items:center; gap:8px; color:var(--t2); font-size:12px; }

#db { display:none; padding:16px 24px 40px; max-width:1000px; margin:0 auto; }
#db.on { display:block; animation:fIn .4s ease; }

.tb { display:flex; gap:4px; background:var(--sg); border-radius:8px; padding:3px; margin-bottom:14px; width:fit-content; }
.tb button { padding:8px 18px; border:none; border-radius:6px; font-size:11px; font-weight:600; cursor:pointer; font-family:var(--fn); background:transparent; color:var(--t2); transition:all .2s; }
.tb button.on { background:var(--s); color:var(--tx); box-shadow:0 1px 8px rgba(0,0,0,.3); }
.tb button:not(.on):hover { color:var(--tx); }

.pg { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; }
.pc { background:var(--s); backdrop-filter:blur(16px); border:1px solid var(--b); border-radius:var(--r); padding:14px; transition:all .25s; }
.pc:hover { border-color:var(--bh); transform:translateY(-2px); }
.pc .img { width:100%; height:110px; background:var(--sg); border-radius:6px; margin-bottom:10px; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:28px; }
.pc .img img { width:100%; height:100%; object-fit:cover; }
.pc .pn { font-weight:600; font-size:12px; display:flex; justify-content:space-between; align-items:center; }
.pc .pn .pr { color:var(--cyan); font-weight:700; }
.pc .pd { color:var(--t2); font-size:10px; margin-top:4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.pc .pa { display:flex; gap:4px; margin-top:8px; justify-content:flex-end; }
.pc .pa button { background:transparent; border:none; color:var(--t2); cursor:pointer; padding:2px 5px; border-radius:4px; font-size:12px; transition:all .15s; }
.pc .pa button:hover { color:var(--cyan); background:var(--cg); }

.tbl-w { overflow-x:auto; border-radius:var(--r); border:1px solid var(--b); background:var(--s); backdrop-filter:blur(16px); }
.tbl { width:100%; border-collapse:collapse; font-size:12px; min-width:500px; }
.tbl th { text-align:right; padding:10px 14px; color:var(--t2); font-weight:600; font-size:11px; border-bottom:1px solid var(--b); background:var(--sg); white-space:nowrap; }
.tbl td { padding:9px 14px; border-bottom:1px solid var(--b); color:var(--tx); }
.tbl tr:last-child td { border:none; }
.tbl tr:hover td { background:rgba(255,255,255,.01); }

.bdg { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:4px; font-size:10px; font-weight:600; }
.bdg.g { background:rgba(16,185,129,.04); color:var(--em); border:1px solid rgba(16,185,129,.06); }
.bdg.y { background:rgba(255,192,0,.04); color:#ffc000; border:1px solid rgba(255,192,0,.06); }
.bdg.r { background:rgba(255,68,102,.04); color:var(--da); border:1px solid rgba(255,68,102,.06); }
.bdg.p { background:var(--pg); color:var(--pink); border:1px solid rgba(255,45,123,.08); }

.emp { text-align:center; padding:30px; color:var(--t3); font-size:13px; }
.load { display:flex; align-items:center; justify-content:center; padding:20px; }
.sp { width:24px; height:24px; border:2px solid rgba(255,45,123,.06); border-top-color:var(--pink); border-radius:50%; animation:sp .6s linear infinite; }

.tb-top { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
.tb-top .btg { display:flex; gap:6px; }

.modal { position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:100; backdrop-filter:blur(8px); background:rgba(6,6,14,.6); }
.modal.on { display:flex; }
.modal .mc { background:var(--s); backdrop-filter:blur(30px); border:1px solid var(--b); border-radius:14px; padding:32px; width:420px; max-width:90vw; animation:fIn .25s ease; max-height:90vh; overflow-y:auto; }
.modal .mc h2 { font-size:16px; font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:6px; }
.modal .mc textarea { width:100%; padding:9px 12px; background:rgba(0,0,0,.25); border:1px solid var(--b); border-radius:6px; color:var(--tx); font-size:13px; font-family:var(--fn); resize:vertical; min-height:60px; transition:all .2s; }
.modal .mc textarea:focus { outline:none; border-color:var(--pink); box-shadow:0 0 0 3px var(--pg); }
.mg { display:flex; gap:8px; margin-top:16px; justify-content:flex-end; }

#cD { position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:200; backdrop-filter:blur(8px); background:rgba(6,6,14,.6); }
#cD.on { display:flex; }
#cD .mc { background:var(--sh); backdrop-filter:blur(30px); border:1px solid var(--b); border-radius:14px; padding:28px 32px; width:340px; max-width:90vw; text-align:center; animation:fIn .2s ease; }
#cD .mc p { font-size:14px; margin-bottom:14px; }
#cD .mc .mg { justify-content:center; }

#toasts { position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:999; display:flex; flex-direction:column; gap:6px; pointer-events:none; }
.tst { background:var(--sh); backdrop-filter:blur(20px); border:1px solid var(--b); border-radius:8px; padding:10px 18px; font-size:12px; animation:tstIn .3s ease; pointer-events:auto; }
.tst.ok::before { content:'✅ '; }
.tst.bad { border-color:rgba(255,68,102,.06); }
.tst.bad::before { content:'❌ '; }
@keyframes tstIn { from{opacity:0;transform:translateY(-10px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }

@media(max-width:600px){ #hd,#db { padding:12px 14px 24px; } .lc { padding:28px 22px; } .modal .mc { padding:22px; } .pg { grid-template-columns:repeat(2,1fr); } }
</style>
</head>
<body>

<canvas id="bgC"></canvas>
<div class="g-noise"></div>
<div id="toasts"></div>

<div id="ls">
  <div class="lc">
    <div class="lo">
      <div class="ic">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/></svg>
      </div>
      <h1>لوحة المتجر</h1>
      <p>Neon Vendor · v4.0</p>
    </div>
    <div id="le" class="msg b"></div>
    <div class="g"><label>اسم المتجر</label><div class="inp"><input type="text" id="lN" placeholder="اسم المتجر" autocomplete="off" onkeydown="if(event.key==='Enter')login()"></div></div>
    <div class="g"><label>كلمة المرور</label><div class="inp"><input type="password" id="lPw" placeholder="••••••" autocomplete="off" onkeydown="if(event.key==='Enter')login()"></div></div>
    <button class="btn btn-p btn-w" onclick="login()" id="lB">دخول</button>
  </div>
</div>

<div id="hd">
  <div class="tt"><span>◆</span> <span id="sN">-</span></div>
  <div class="sr">
    <span id="hCnt">0 طلبات</span>
    <button class="btn btn-g" onclick="document.getElementById('cD').classList.add('on');document.getElementById('cDM').textContent='تسجيل الخروج؟';document.getElementById('cDY').onclick=function(){document.getElementById('cD').classList.remove('on');localStorage.removeItem('vendor_data');location.reload()}">خروج</button>
  </div>
</div>

<div id="db">
  <div class="tb">
    <button class="on" data-tab="p" onclick="tab('p')">المنتجات</button>
    <button data-tab="o" onclick="tab('o')">الطلبات</button>
  </div>
  <div id="tp" class="tv">
    <div class="tb-top">
      <div></div>
      <div class="btg"><button class="btn btn-p" onclick="addP()">+ إضافة منتج</button></div>
    </div>
    <div class="pg" id="pG"></div>
  </div>
  <div id="to" class="tv" style="display:none;">
    <div class="tbl-w">
      <table class="tbl">
        <thead><tr><th>الطلب</th><th>العميل</th><th>المنتج</th><th>المبلغ</th><th>الحالة</th><th style="width:60px;"></th></tr></thead>
        <tbody id="oB"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal" id="pM">
  <div class="mc">
    <h2 id="pMT">+ منتج جديد</h2>
    <div class="g"><label>اسم المنتج</label><div class="inp"><input type="text" id="pN" placeholder="اسم المنتج"></div></div>
    <div class="g"><label>السعر</label><div class="inp"><input type="number" id="pPr" placeholder="0" step="0.01"></div></div>
    <div class="g"><label>رابط الصورة</label><div class="inp"><input type="url" id="pI" placeholder="https://..."></div></div>
    <div class="g"><label>الوصف</label><textarea id="pD" placeholder="وصف المنتج" rows="3"></textarea></div>
    <div class="mg">
      <button class="btn btn-g" onclick="document.getElementById('pM').classList.remove('on')">إلغاء</button>
      <button class="btn btn-p" onclick="saveP()">حفظ</button>
    </div>
  </div>
</div>

<div id="cD">
  <div class="mc">
    <p id="cDM">هل أنت متأكد؟</p>
    <div class="mg">
      <button class="btn btn-g" onclick="document.getElementById('cD').classList.remove('on')">إلغاء</button>
      <button class="btn btn-d" id="cDY" onclick="">تأكيد</button>
    </div>
  </div>
</div>

<script>
const bc=document.getElementById('bgC'),bx=bc.getContext('2d');
let bw,bh;
const orbs=[];
for(let i=0;i<4;i++){orbs.push({x:Math.random(),y:Math.random(),r:0.1+Math.random()*0.15,sx:(Math.random()-.5)*.0015,sy:(Math.random()-.5)*.0015,c:['#ff2d7b','#00e5ff','#7c3aed','#10b981'][i],a:0.03+Math.random()*0.04})}
function rs(){bw=bc.width=innerWidth;bh=bc.height=innerHeight}
rs();addEventListener('resize',rs);
function dr(){bx.clearRect(0,0,bw,bh);orbs.forEach(o=>{o.x+=o.sx;o.y+=o.sy;if(o.x<-.1||o.x>1.1)o.sx*=-1;if(o.y<-.1||o.y>1.1)o.sy*=-1;const g=bx.createRadialGradient(o.x*bw,o.y*bh,0,o.x*bw,o.y*bh,o.r*bw);g.addColorStop(0,o.c+String(Math.round(o.a*255)).padStart(2,'0'));g.addColorStop(1,'transparent');bx.fillStyle=g;bx.fillRect(0,0,bw,bh)});requestAnimationFrame(dr)}
dr();

function toast(m,t='ok'){const e=document.createElement('div');e.className='tst '+t;e.textContent=m;document.getElementById('toasts').appendChild(e);setTimeout(()=>e.remove(),3000)}

const A='/api';
let vData=null,P=[],O=[];

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

async function login(){
  const n=document.getElementById('lN').value.trim(),pw=document.getElementById('lPw').value,b=document.getElementById('lB');
  if(!n||!pw)return;b.disabled=true;b.textContent='...';
  try{
    const r=await(await fetch(A+'/vendor/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,password:pw})})).json();
    if(r.success){vData={name:r.name,token:r.token};localStorage.setItem('vendor_data',JSON.stringify(vData));enter()}
    else{document.getElementById('le').textContent=r.error||'خطأ';document.getElementById('le').style.display='block';setTimeout(()=>document.getElementById('le').style.display='none',3000)}
  }catch(e){document.getElementById('le').textContent='فشل الاتصال';document.getElementById('le').style.display='block';setTimeout(()=>document.getElementById('le').style.display='none',3000)}
  b.disabled=false;b.textContent='دخول';
}

function enter(){
  document.getElementById('ls').classList.add('h');
  document.getElementById('hd').classList.add('on');
  document.getElementById('db').classList.add('on');
  document.getElementById('sN').textContent=vData.name;
  init();
}

try{const d=JSON.parse(localStorage.getItem('vendor_data'));if(d&&d.name){vData=d;enter()}}catch(e){}

async function init(){await Promise.all([loadP(),loadO()])}

async function loadP(){
  try{const r=await(await fetch(A+'/vendor/'+vData.name+'/products')).json();P=Array.isArray(r)?r:(r.products||r.data||[]);renderP()}catch(e){}
}
async function loadO(){
  try{const r=await(await fetch(A+'/vendor/'+vData.name+'/orders')).json();O=Array.isArray(r)?r:(r.orders||r.data||[]);renderO();document.getElementById('hCnt').textContent=O.length+' طلبات'}catch(e){}
}

function renderP(){
  const g=document.getElementById('pG');
  if(!P.length){g.innerHTML='<div class="emp" style="grid-column:1/-1">لا توجد منتجات</div>';return}
  g.innerHTML=P.map(p=>{
    const id=p.id,n=p.name||'-',pr=p.price||0,im=p.image||p.image_url||'',ds=p.description||p.desc||'';
    return `<div class="pc"><div class="img">${im?`<img src="${esc(im)}" loading="lazy" onerror="this.parentElement.textContent='📦'">`:'📦'}</div><div class="pn"><span>${esc(n)}</span><span class="pr">${pr} ر.س</span></div>${ds?`<div class="pd">${esc(ds)}</div>`:''}<div class="pa"><button onclick="dP('${id}')" title="حذف">✕</button></div></div>`
  }).join('');
}

function renderO(){
  const b=document.getElementById('oB');
  if(!O.length){b.innerHTML='<tr><td colspan="6"><div class="emp">لا توجد طلبات</div></td></tr>';return}
  b.innerHTML=O.map(o=>{
    const id=o.id||o._id||o.order_id||'-',cl=o.customer_name||o.customer||o.name||'-',pr=o.product_name||o.product||o.item||'-',am=o.total||o.amount||0,st=o.status||'pending';
    return `<tr><td style="color:var(--t2);font-size:10px;">${esc(String(id).slice(0,8))}</td><td>${esc(cl)}</td><td>${esc(pr)}</td><td>${am} ر.س</td><td>${bdg(st)}</td><td><div style="display:flex;gap:4px;"><button class="btn btn-c" onclick="uO('${id}','confirmed')">تأكيد</button></div></td></tr>`
  }).join('');
}

function bdg(s){const m={active:'g',pending:'y',inactive:'r',confirmed:'g',preparing:'p',ready:'c',delivered:'g',cancelled:'r'};const lm={active:'نشط',pending:'معلق',inactive:'متوقف',confirmed:'مؤكد',preparing:'قيد التحضير',ready:'جاهز',delivered:'تم التوصيل',cancelled:'ملغي'};return`<span class="bdg ${m[s]||'y'}">${lm[s]||s}</span>`}

function tab(t){document.querySelectorAll('.tb button').forEach(b=>b.classList.remove('on'));document.querySelector(`.tb button[data-tab="${t}"]`).classList.add('on');document.getElementById('tp').style.display=t==='p'?'block':'none';document.getElementById('to').style.display=t==='o'?'block':'none'}

let pEditId=null;
function addP(){pEditId=null;document.getElementById('pMT').textContent='+ منتج جديد';document.getElementById('pN').value='';document.getElementById('pPr').value='';document.getElementById('pI').value='';document.getElementById('pD').value='';document.getElementById('pM').classList.add('on')}

async function saveP(){const n=document.getElementById('pN').value.trim(),pr=parseFloat(document.getElementById('pPr').value),im=document.getElementById('pI').value.trim(),ds=document.getElementById('pD').value.trim();if(!n)return toast('أدخل اسم المنتج','bad');try{await fetch(A+'/vendor/'+vData.name+'/products',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,price:pr,image:im,description:ds})});toast('تمت الإضافة','ok');document.getElementById('pM').classList.remove('on');loadP()}catch(e){toast('فشل الحفظ','bad')}}

async function dP(id){document.getElementById('cDM').textContent='حذف المنتج؟';document.getElementById('cDY').onclick=async function(){document.getElementById('cD').classList.remove('on');try{await fetch(A+'/vendor/'+vData.name+'/products/'+id,{method:'DELETE'});toast('تم الحذف','ok');loadP()}catch(e){toast('فشل الحذف','bad')}};document.getElementById('cD').classList.add('on')}

async function uO(id,st){try{await fetch(A+'/vendor/'+vData.name+'/orders/'+id+'/status',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:st})});toast('تم التحديث','ok');loadO()}catch(e){toast('فشل التحديث','bad')}}

setInterval(()=>{if(vData){loadO()}},20000);
document.querySelectorAll('.modal,#cD').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('on')})});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.querySelectorAll('.modal.on,#cD.on').forEach(m=>m.classList.remove('on'))}});
</script>
</body>
</html>
